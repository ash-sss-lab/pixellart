<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piksel</title>
    <link rel="stylesheet" href="styleredactor.css">
</head>
<body>
    <div class="field-container">
        <div class="color-palette">
            <div class="color-cell red selected"></div>
            <div class="color-cell green"></div>
            <div class="color-cell blue"></div>
            <div class="color-cell yellow"></div>
            <div class="color-cell orange"></div>
            <div class="color-cell skyblue"></div>
            <div class="tool-cell eraser">
                <img src="eraser_white.png" alt="eraser">
            </div>
            <div class="tool-cell fill-tool">
                <img src="bucket_white.png" alt="fill">
            </div>
        </div> 
        <div class="field"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
